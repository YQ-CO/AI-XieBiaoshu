name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      perf_vus:
        description: 'Performance VUs (manual trigger only)'
        required: false
        default: '5'
      perf_duration:
        description: 'Performance duration, e.g. 2m (manual trigger only)'
        required: false
        default: '2m'

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend Typecheck + Unit + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (with coverage)
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 90
          if-no-files-found: ignore

  frontend-e2e-smoke:
    name: Frontend E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm install --no-audit --no-fund

      - name: Install frontend dependencies
        run: cd frontend && npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: cd frontend && npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 90
          if-no-files-found: ignore

  backend-quality:
    name: Backend Lint + Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  backend:
    name: Backend Build + Tests + Audit
    runs-on: ubuntu-latest
    needs: backend-quality
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Unit tests (with coverage)
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Dependency audit (high severity blocks)
        run: npm run security:audit

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 90
          if-no-files-found: ignore

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-semgrep:
    name: Static Scan (Semgrep)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep observe group (non-blocking)
        run: ./scripts/run-semgrep.sh observe backend/src .reports/semgrep

      - name: Run Semgrep blocking group
        run: ./scripts/run-semgrep.sh blocking backend/src .reports/semgrep

      - name: Upload Semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            .reports/semgrep/semgrep-observe.json
            .reports/semgrep/semgrep-blocking.json
          retention-days: 90
          if-no-files-found: ignore

  security-trivy:
    name: Filesystem Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: trivy-report.json
          exit-code: '1'

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 90
          if-no-files-found: ignore

  performance:
    name: Performance Baseline (k6)
    runs-on: ubuntu-latest
    needs: backend
    if: |
      (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm install --no-audit --no-fund

      - name: Build backend
        run: cd backend && npm run build

      - name: Start backend server
        run: |
          cd backend
          node dist/index.js > /tmp/backend-perf.log 2>&1 &
          echo $! > /tmp/backend-perf.pid

      - name: Wait for backend readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "backend did not become ready in time"
          exit 1

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 baseline
        env:
          BASE_URL: http://127.0.0.1:3000
          K6_VUS: ${{ inputs.perf_vus || '5' }}
          K6_DURATION: ${{ inputs.perf_duration || '2m' }}
        run: k6 run backend/perf/k6-baseline.js

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-k6
          path: |
            backend/perf/k6-summary.json
            /tmp/backend-perf.log
          retention-days: 90
          if-no-files-found: ignore

      - name: Stop backend server
        if: always()
        run: |
          if [ -f /tmp/backend-perf.pid ]; then
            kill "$(cat /tmp/backend-perf.pid)" || true
          fi
